<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rectangle -->
  <rect width="800" height="200" fill="url(#grad1)"/>
  
  <!-- Support agent illustration -->
  <g transform="translate(50, 30)">
    <!-- Head -->
    <circle cx="80" cy="60" r="35" fill="#FFD4A3"/>
    
    <!-- Hair -->
    <path d="M 45 55 Q 45 25 80 20 Q 115 25 115 55 Z" fill="#4A4A4A"/>
    
    <!-- Eyes -->
    <circle cx="70" cy="55" r="3" fill="#333"/>
    <circle cx="90" cy="55" r="3" fill="#333"/>
    
    <!-- Smile -->
    <path d="M 65 70 Q 80 78 95 70" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Body -->
    <rect x="55" y="95" width="50" height="35" rx="5" fill="#4CAF50"/>
    
    <!-- Arms -->
    <rect x="40" y="95" width="15" height="25" rx="3" fill="#FFD4A3"/>
    <rect x="105" y="95" width="15" height="25" rx="3" fill="#FFD4A3"/>
    
    <!-- Headset -->
    <path d="M 50 50 Q 48 60 50 70" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="50" cy="70" r="5" fill="#333"/>
    <path d="M 110 50 Q 112 60 110 70" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="110" cy="70" r="5" fill="#333"/>
    <rect x="48" y="48" width="64" height="5" rx="2" fill="#333"/>
  </g>
  
  <!-- Chat bubbles decoration -->
  <g transform="translate(650, 50)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="rgba(255,255,255,0.3)"/>
    <rect x="10" y="50" width="100" height="35" rx="17" fill="rgba(255,255,255,0.2)"/>
    <rect x="20" y="95" width="90" height="30" rx="15" fill="rgba(255,255,255,0.15)"/>
  </g>
  
  <!-- Welcome text -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">
    Welcome to Support Chat
  </text>
  <text x="200" y="115" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)">
    We're here to help you 24/7
  </text>
  
  <!-- Support icon -->
  <g transform="translate(200, 135)">
    <circle cx="10" cy="10" r="8" fill="rgba(255,255,255,0.3)"/>
    <path d="M 10 5 L 10 10 L 13 10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
